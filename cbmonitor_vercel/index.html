<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CB Monitor — Bancos Centrais</title>
<meta name="description" content="Monitoramento educacional de decisões de bancos centrais globais. Cotações FX ao vivo, calendário econômico em tempo real.">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0d1117;
  --card:   #161b22;
  --card2:  #1c2330;
  --line:   rgba(255,255,255,0.07);
  --line2:  rgba(255,255,255,0.13);
  --white:  #f0f4f8;
  --g1:     #c9d3df;
  --g2:     #7a8899;
  --g3:     #3d4d5e;
  --amber:  #fbbf24;
  --aa:     rgba(251,191,36,0.13);
  --ab:     rgba(251,191,36,0.22);
  --green:  #34d399;
  --ga:     rgba(52,211,153,0.13);
  --gb:     rgba(52,211,153,0.22);
  --red:    #f87171;
  --ra:     rgba(248,113,113,0.13);
  --rb:     rgba(248,113,113,0.22);
  --blue:   #60a5fa;
  --ba:     rgba(96,165,250,0.13);
  --bb:     rgba(96,165,250,0.22);
  --sans:   'Sora', sans-serif;
  --mono:   'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--white);font-family:var(--sans);font-size:15px;line-height:1.5;}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;}

/* ── SHELL ── */
.app{display:grid;grid-template-rows:62px 1fr;height:100vh;overflow:hidden;}

/* ── DISCLAIMER MODAL ── */
.disc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.disc-box{background:var(--card);border:1px solid var(--line2);border-radius:16px;max-width:560px;width:100%;padding:36px 40px;}
.disc-logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.disc-logo-icon{width:40px;height:40px;background:var(--amber);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.disc-logo-icon svg{width:22px;height:22px;fill:#0d1117;}
.disc-title{font-size:22px;font-weight:700;color:var(--white);}
.disc-sub{font-size:11px;color:var(--g3);font-family:var(--mono);margin-top:2px;}
.disc-body{font-size:14px;color:var(--g1);line-height:1.75;margin-bottom:28px;}
.disc-body strong{color:var(--white);}
.disc-body ul{margin:12px 0 12px 18px;display:flex;flex-direction:column;gap:6px;}
.disc-btn{width:100%;padding:14px;background:var(--amber);color:#0d1117;font-size:15px;font-weight:700;border-radius:10px;cursor:pointer;transition:opacity .15s;}
.disc-btn:hover{opacity:.9;}
.disc-footer{text-align:center;margin-top:12px;font-size:11px;color:var(--g3);font-family:var(--mono);}

/* ── HEADER ── */
.hdr{background:var(--card);border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:11px;}
.logo-icon{width:34px;height:34px;background:var(--amber);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:18px;height:18px;fill:#0d1117;}
.logo-name{font-size:17px;font-weight:700;color:var(--white);}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--g3);letter-spacing:.07em;margin-top:1px;}
.hdr-mid{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hbadge{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.hb-live{background:var(--ga);color:var(--green);}
.hb-live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hb-warn{background:var(--aa);color:var(--amber);}
.hb-done{background:var(--ga);color:var(--green);}
.hb-red{background:var(--ra);color:var(--red);}
.hdr-clock{font-family:var(--mono);font-size:12px;color:var(--g3);}

/* ── BODY ── */
.body{display:grid;grid-template-columns:284px 1fr;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{background:var(--card);border-right:1px solid var(--line);overflow-y:auto;}
.sb-lbl{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--g3);letter-spacing:.1em;padding:14px 14px 7px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:1;}
.brow{padding:13px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;border-left:3px solid transparent;}
.brow:hover{background:var(--card2);}
.brow.active{background:var(--ba);border-left-color:var(--blue);}
.brow.active .ba{color:var(--blue);}
.bt{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.bid{display:flex;align-items:center;gap:8px;}
.bflag{font-size:20px;}
.ba{font-size:15px;font-weight:700;color:var(--white);}
.bcur{font-size:11px;color:var(--g2);}
.bb2{display:flex;align-items:center;justify-content:space-between;}
.brate{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--g1);}
.bwhen{font-size:11px;font-weight:600;}
.wt{color:var(--amber);}
.ws{color:var(--blue);}
.wf{color:var(--g2);}
.wr{color:var(--red);}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.03em;padding:3px 9px;border-radius:6px;}
.p-hold{background:rgba(255,255,255,.07);color:var(--g1);}
.p-hike{background:var(--ra);color:var(--red);}
.p-cut{background:var(--ga);color:var(--green);}
.p-watch{background:var(--aa);color:var(--amber);}
.p-done{background:rgba(255,255,255,.05);color:var(--g2);border:1px solid var(--line2);}
.src-tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--g3);background:var(--card2);border:1px solid var(--line2);border-radius:5px;padding:2px 7px;margin-top:6px;}
.src-tag.verified{border-color:var(--gb);color:var(--green);}
.src-tag.pending{border-color:var(--ab);color:var(--amber);}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line2);padding:0 22px;flex-shrink:0;}
.tab{padding:15px 18px;font-size:13px;font-weight:600;color:var(--g2);border-bottom:3px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;}
.tab.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab:hover:not(.active){color:var(--g1);}
.scroll{flex:1;overflow-y:auto;padding:26px;}
.pane{display:none;}
.pane.active{display:block;}

/* ── DETAIL ── */
.hero{background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:26px 30px;margin-bottom:18px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.hl{display:flex;align-items:center;gap:18px;}
.hflag{font-size:52px;line-height:1;}
.hname{font-size:24px;font-weight:700;color:var(--white);line-height:1.15;margin-bottom:3px;}
.hfull{font-size:13px;color:var(--g2);margin-bottom:9px;}
.hr{text-align:right;flex-shrink:0;}
.hrl{font-family:var(--mono);font-size:11px;color:var(--g3);letter-spacing:.07em;margin-bottom:4px;}
.hrate{font-family:var(--mono);font-size:36px;font-weight:700;line-height:1;margin-bottom:8px;}
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.kcard{background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:18px 20px;}
.kl{font-family:var(--mono);font-size:10px;color:var(--g3);letter-spacing:.07em;margin-bottom:7px;}
.kv{font-size:19px;font-weight:700;color:var(--white);line-height:1.2;margin-bottom:3px;}
.ks{font-size:12px;color:var(--g2);}
.stitle{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--g3);letter-spacing:.1em;margin-bottom:12px;margin-top:4px;padding-bottom:9px;border-bottom:1px solid var(--line);}
.alert{border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:13px;line-height:1.65;border:1px solid;}
.alert-done{background:var(--ga);border-color:var(--gb);color:var(--white);}
.alert-warn{background:var(--aa);border-color:var(--ab);color:var(--white);}
.alert-hike{background:var(--ra);border-color:var(--rb);color:var(--white);}
.alert strong{font-weight:700;}
.scgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:24px;}
.sc{background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:20px 18px;border-top:3px solid;}
.sc.hawk{border-top-color:var(--red);}
.sc.hold{border-top-color:var(--g3);}
.sc.dove{border-top-color:var(--green);}
.sp{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1;margin-bottom:3px;}
.sc.hawk .sp{color:var(--red);}
.sc.hold .sp{color:var(--g1);}
.sc.dove .sp{color:var(--green);}
.st{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;margin-bottom:11px;}
.sc.hawk .st{color:var(--red);}
.sc.hold .st{color:var(--g3);}
.sc.dove .st{color:var(--green);}
.stt{font-size:14px;font-weight:600;color:var(--white);margin-bottom:7px;}
.sd{font-size:13px;color:var(--g2);line-height:1.6;}
.itw{background:var(--card);border:1px solid var(--line2);border-radius:12px;overflow:hidden;margin-bottom:24px;}
.itable{width:100%;border-collapse:collapse;}
.itable th{background:var(--card2);padding:13px 16px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--g3);letter-spacing:.07em;text-align:left;border-bottom:1px solid var(--line2);}
.itable td{padding:15px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
.itable tr:last-child td{border-bottom:none;}
.itable tr:hover td{background:var(--card2);}
.ia{font-size:14px;font-weight:700;color:var(--white);}
.ip{font-size:12px;color:var(--g2);margin-top:2px;}
.dir{font-family:var(--mono);font-size:13px;font-weight:700;padding:5px 13px;border-radius:7px;display:inline-block;}
.du{background:var(--ga);color:var(--green);}
.dd{background:var(--ra);color:var(--red);}
.dn{background:rgba(255,255,255,.05);color:var(--g2);}
.notes{background:var(--aa);border:1px solid var(--ab);border-radius:11px;padding:16px 20px;font-size:13px;color:var(--g1);line-height:1.7;margin-bottom:24px;}
.note-na{background:var(--card2);border:1px solid var(--line2);border-radius:11px;padding:16px 20px;font-size:13px;color:var(--g2);line-height:1.65;margin-bottom:24px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.chip{font-family:var(--mono);font-size:12px;font-weight:600;padding:5px 13px;border-radius:8px;border:1px solid;}
.ct{background:var(--aa);color:var(--amber);border-color:var(--ab);}
.cs{background:var(--ba);color:var(--blue);border-color:var(--bb);}
.cf{background:rgba(255,255,255,.04);color:var(--g2);border-color:var(--line);}
.ch{background:var(--ra);color:var(--red);border-color:var(--rb);}
.schw{background:var(--card);border:1px solid var(--line2);border-radius:12px;overflow:hidden;}
.scht{width:100%;border-collapse:collapse;}
.scht th{background:var(--card2);padding:13px 16px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--g3);letter-spacing:.07em;text-align:left;border-bottom:1px solid var(--line2);}
.scht td{padding:15px 16px;border-bottom:1px solid var(--line);vertical-align:middle;}
.scht tr:last-child td{border-bottom:none;}
.scht tr:hover td{background:var(--card2);cursor:pointer;}
.scht tr.rowt td{background:var(--aa);}
.scht tr.rowr td{background:var(--ra);}
.sdate{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--white);}
.srate{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--g1);}
.dc{font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;}
.dct{background:var(--aa);color:var(--amber);}
.dcs{background:var(--ba);color:var(--blue);}
.dcf{background:rgba(255,255,255,.04);color:var(--g3);}
.dcr{background:var(--ra);color:var(--red);}
.fcard{background:var(--card);border:1px solid var(--line2);border-radius:13px;padding:22px 26px;margin-bottom:18px;}
.ftrig{display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border-radius:10px;border:2px solid;font-size:15px;font-weight:700;margin-bottom:18px;}
.fhawk{background:var(--ra);border-color:var(--red);color:var(--red);}
.fdove{background:var(--ga);border-color:var(--green);color:var(--green);}
.frows{display:flex;flex-direction:column;gap:13px;}
.frow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.fcause{background:var(--card2);border:1px solid var(--line2);border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;color:var(--g1);min-width:155px;text-align:center;}
.farr{font-size:16px;color:var(--g3);}
.fres-wrap{display:flex;flex-wrap:wrap;gap:7px;}
.fr{font-family:var(--mono);font-size:12px;font-weight:700;padding:6px 13px;border-radius:7px;}
.fru{background:var(--ga);color:var(--green);}
.frd{background:var(--ra);color:var(--red);}
.frn{background:rgba(255,255,255,.06);color:var(--g2);}
.cross{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px;}
.ccard{background:var(--card2);border:1px solid var(--line2);border-radius:9px;padding:14px;text-align:center;}
.ccond{font-size:12px;color:var(--g2);line-height:1.5;margin-bottom:9px;white-space:pre-line;}
.cres{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--amber);white-space:pre-line;}
.tline{position:relative;padding-left:30px;}
.tline::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--line2);border-radius:1px;}
.titem{position:relative;margin-bottom:18px;}
.tdot{position:absolute;left:-23px;top:18px;width:12px;height:12px;border-radius:50%;}
.td-today{background:var(--amber);box-shadow:0 0 0 4px var(--aa);}
.td-done{background:var(--green);box-shadow:0 0 0 4px var(--ga);}
.td-hike{background:var(--red);box-shadow:0 0 0 4px var(--ra);}
.td-soon{background:var(--card2);border:2px solid var(--blue);}
.td-far{background:var(--card2);border:2px solid var(--g3);}
.tcard{background:var(--card);border:1px solid var(--line2);border-radius:11px;padding:16px 20px;}
.tdlbl{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--g2);margin-bottom:11px;}
.tmark{color:var(--amber);font-weight:700;}
.tmark-done{color:var(--green);font-weight:700;}
.tmark-hike{color:var(--red);font-weight:700;}
.tbanks{display:flex;flex-direction:column;gap:9px;}
.tbank{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border:1px solid var(--line2);border-radius:9px;cursor:pointer;transition:background .12s;}
.tbank:hover{background:var(--card2);}
.tbl{display:flex;align-items:center;gap:10px;}
.tflg{font-size:20px;}
.tabb{font-size:14px;font-weight:700;color:var(--white);}
.tful{font-size:11px;color:var(--g2);margin-top:2px;}
.disclaimer{font-family:var(--mono);font-size:10px;color:var(--g3);margin-top:20px;padding:10px 14px;border:1px solid var(--line);border-radius:7px;line-height:1.6;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px;}
@media(max-width:860px){
  .body{grid-template-columns:1fr;grid-template-rows:220px 1fr;}
  .krow{grid-template-columns:1fr 1fr;}
  .scgrid{grid-template-columns:1fr;}
  .cross{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 20 20"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" opacity=".4"/></svg></div>
    <div><div class="logo-name">CB Monitor</div><div class="logo-sub" id="hdr-date">MONITORAMENTO DE BANCOS CENTRAIS</div></div>
  </div>
  <div class="hdr-mid">
    <span class="hbadge hb-done">✓ Fed HOLD 3,50–3,75%</span>
    <span class="hbadge hb-done">✓ Copom −0,25pp → 14,75%</span>
    <span class="hbadge hb-done">✓ BoC HOLD 2,25%</span>
    <span class="hbadge hb-done">✓ RBA HIKE 4,10%</span>
    <span class="hbadge hb-warn">⏳ ECB · BoE · BoJ · SNB — hoje</span>
  </div>
  <div class="hdr-clock" id="clock"></div>
</header>

<div class="body">
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <nav class="tabs">
    <button class="tab active" onclick="showTab('detail')">Detalhes</button>
    <button class="tab" onclick="showTab('schedule')">Calendário BC</button>
    <button class="tab" onclick="showTab('flow')">Fluxo</button>
    <button class="tab" onclick="showTab('timeline')">Timeline</button>
    <button class="tab" onclick="showTab('carry')">Carry + FX Live</button>
    <button class="tab" onclick="showTab('ecocal')">Cal. Econômico Live</button>
    <button class="tab" onclick="showTab('correl')">Correlações</button>
  </nav>
  <div class="scroll">
    <div class="pane active" id="tab-detail">
      <div id="dc">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:var(--g3)">
          <div style="font-size:44px">🏦</div>
          <div style="font-size:15px">Selecione um banco central na barra lateral</div>
        </div>
      </div>
    </div>
    <div class="pane" id="tab-schedule"><div id="sc"></div></div>
    <div class="pane" id="tab-flow"><div id="fc"></div></div>
    <div class="pane" id="tab-timeline"><div id="tc"></div></div>
    <div class="pane" id="tab-carry"><div id="carry-content"></div></div>
    <div class="pane" id="tab-ecocal"><div id="ecocal-content"></div></div>
    <div class="pane" id="tab-correl"><div id="correl-content"></div></div>
  </div>
</div>
</div>
</div>

<script>
// ── TODAY (dynamic) ─────────────────────────────────────────────────────
const TODAY = new Date();
const dfmt = ds => new Date(ds+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
const days = ds => Math.round((new Date(ds)-TODAY)/86400000);

// ═══════════════════════════════════════════════════════════════════
// ── CONFIGURAÇÃO DOS BANCOS CENTRAIS ─────────────────────────────────
// Estes dados mudam ~8x por ano por BC (apenas após reuniões).
// Para atualizar: altere o campo 'rate' do BC correspondente.
// Última atualização: 18/03/2026
// ═══════════════════════════════════════════════════════════════════
const BC_RATES = {
  fed:   { rate: 3.625, display: '3,50–3,75%', lastDecision: '2026-03-18', lastResult: 'HOLD', nextMeeting: '2026-04-29' },
  copom: { rate: 14.75, display: '14,75%',     lastDecision: '2026-03-18', lastResult: 'CORTE −0,25pp', nextMeeting: '2026-05-06' },
  ecb:   { rate: 2.15,  display: '2,15%',      lastDecision: '2026-03-19', lastResult: '—',   nextMeeting: '2026-04-17' },
  boe:   { rate: 3.75,  display: '3,75%',      lastDecision: '2026-03-19', lastResult: '—',   nextMeeting: '2026-04-30' },
  boj:   { rate: 0.75,  display: '0,75%',      lastDecision: '2026-03-19', lastResult: '—',   nextMeeting: '2026-04-30' },
  snb:   { rate: 0.00,  display: '0,00%',      lastDecision: '2026-03-19', lastResult: '—',   nextMeeting: '2026-06-19' },
  boc:   { rate: 2.25,  display: '2,25%',      lastDecision: '2026-03-18', lastResult: 'HOLD',nextMeeting: '2026-04-29' },
  rba:   { rate: 4.10,  display: '4,10%',      lastDecision: '2026-03-17', lastResult: 'HIKE +0,25pp', nextMeeting: '2026-05-05' },
};

async function fetchFXRates(){
  const status=document.getElementById('fx-status');
  try{
    const res=await fetch('https://open.er-api.com/v6/latest/USD');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.result!=='success') throw new Error('API error');
    const rates=data.rates;
    const upd=new Date(data.time_last_update_utc).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    if(status){ status.textContent='✓ AO VIVO · '+upd; status.style.color='var(--green)'; }
    // Preenche cotações individuais
    CCY_LIST.forEach(c=>{
      const el=document.getElementById('fx-'+c.id);
      if(!el) return;
      if(c.id==='USD'){el.textContent='1,0000';el.style.color='var(--g1)';return;}
      const r=rates[c.id];
      if(r){el.textContent=r<1?r.toFixed(4):r.toFixed(2);el.style.color='var(--g1)';}
    });
    // Cross rates para carry pairs
    CARRY_PAIRS.forEach(p=>{
      const el=document.getElementById('pair-'+p.long+'-'+p.short);
      if(!el) return;
      const rL=p.long==='USD'?1:rates[p.long];
      const rS=p.short==='USD'?1:rates[p.short];
      if(rL&&rS){
        const cross=rL/rS;
        el.textContent=cross<0.01?cross.toFixed(5):cross<1?cross.toFixed(4):cross.toFixed(2);
        el.style.color='var(--g1)';
      }
    });
  }catch(err){
    if(status){status.textContent='⚠ offline — dados estáticos';status.style.color='var(--amber)';}
  }
}

async function fetchCalendarBackend(){
  const status = document.getElementById('cal-status');
  const wrap   = document.getElementById('cal-table-wrap');
  if(!wrap) return;
  try {
    const res  = await fetch('/api/calendar', { signal: AbortSignal.timeout(10000) });
    const data = await res.json();

    if(!data.ok || !data.events?.length) throw new Error(data.error || 'sem dados');

    // ── Auto-apply BC results from Forex Factory ──────────────────────
    if(data.bcUpdates && Object.keys(data.bcUpdates).length){
      applyBCUpdates(data.bcUpdates);
    }

    renderCalendarTable(data.events, status, wrap);

  } catch(err){
    // Fallback: mostrar calendário local gerado
    if(status){ status.textContent = '⚠ servidor indisponível — dados locais'; status.style.color = 'var(--amber)'; }
    renderCalendarTable(generateCalendarEvents().map(e => ({
      ...e, date: e.date.toISOString(), title: e.event,
      country: e.currency, impact: e.impact,
      forecast: e.forecast, previous: e.previous, actual: e.actual,
    })), status, wrap);
  }
}

// Aplica automaticamente resultados de BC vindos da Forex Factory
function applyBCUpdates(updates){
  Object.entries(updates).forEach(([bcKey, upd]) => {
    if(!BC_RATES[bcKey]) return;
    const prev = BC_RATES[bcKey];
    // Só atualiza se o dado for mais recente
    if(upd.date && new Date(upd.date) > new Date(prev.lastDecision)){
      if(upd.rateValue !== null) {
        BC_RATES[bcKey].rate        = upd.rateValue;
        BC_RATES[bcKey].display     = upd.actual;
      }
      BC_RATES[bcKey].lastDecision  = upd.date.split('T')[0];
      BC_RATES[bcKey].lastResult    = upd.actual;
      console.info(`BC_RATES auto-updated: ${bcKey} → ${upd.actual}`);
    }
  });
  // Rebuilds sidebar e carry com taxas atualizadas
  buildSidebar();
  if(document.getElementById('carry-content')?.innerHTML.includes('fx-status')){
    buildCarry();
  }
}

function renderCalendarTable(events, status, wrap){
  const now = new Date();
  const flagMap = {USD:'🇺🇸',EUR:'🇪🇺',GBP:'🇬🇧',JPY:'🇯🇵',CAD:'🇨🇦',AUD:'🇦🇺',CHF:'🇨🇭',BRL:'🇧🇷',NZD:'🇳🇿'};
  const impDot  = {High:'<span style="color:var(--red)">●</span>',Medium:'<span style="color:var(--amber)">◑</span>'};

  const window_start = new Date(now - 7*86400000);
  const window_end   = new Date(now.getTime() + 60*86400000);

  const filtered = events
    .filter(e => {
      const cur = e.country || e.currency || '';
      const d   = new Date(e.date);
      return CAL_CURRENCIES.includes(cur)
        && (e.impact==='High' || e.impact==='Medium')
        && d >= window_start && d <= window_end;
    })
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  if(status) status.textContent = `✓ ${filtered.length} eventos · Forex Factory`;
  if(status) status.style.color = 'var(--green)';

  const byDate = {};
  filtered.forEach(e => {
    const d = new Date(e.date).toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).toUpperCase();
    if(!byDate[d]) byDate[d] = [];
    byDate[d].push(e);
  });

  let rows = '';
  Object.entries(byDate).forEach(([dateLabel, evts]) => {
    const isToday = new Date(evts[0].date).toDateString() === now.toDateString();
    rows += `<tr><td colspan="7" style="background:${isToday?'var(--aa)':'var(--card2)'};padding:8px 16px;font-family:var(--mono);font-size:10px;color:${isToday?'var(--amber)':'var(--g3)'};letter-spacing:.08em">
      ${isToday ? '⚡ HOJE · ' : ''}${dateLabel}
    </td></tr>`;
    evts.forEach(e => {
      const cur = e.country || e.currency || '';
      const hasBeat = e.actual && e.forecast;
      const beat    = hasBeat && parseFloat(e.actual) >= parseFloat(e.forecast);
      const actual  = e.actual
        ? `<span style="color:${hasBeat?(beat?'var(--green)':'var(--red)'):'var(--g1)'};font-weight:700">${e.actual}</span>`
        : `<span style="color:var(--g3)">—</span>`;
      const time = new Date(e.date).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      rows += `<tr>
        <td style="font-family:var(--mono);font-size:12px;color:var(--g2)">${time}</td>
        <td style="font-size:16px">${flagMap[cur]||cur}</td>
        <td>${impDot[e.impact]||''}</td>
        <td><div style="font-size:13px;font-weight:600;color:var(--white)">${e.title||e.event||''}</div></td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--g2)">${e.forecast||'—'}</td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--g2)">${e.previous||'—'}</td>
        <td style="font-family:var(--mono);font-size:12px">${actual}</td>
      </tr>`;
    });
  });

  wrap.innerHTML = `
    <div class="schw"><table class="scht">
      <thead><tr>
        <th>HORA</th><th>MOEDA</th><th>IMP.</th><th>EVENTO</th><th>PREVISÃO</th><th>ANTERIOR</th><th>REAL</th>
      </tr></thead>
      <tbody>${rows || '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--g3)">Sem eventos de alto/médio impacto neste período</td></tr>'}</tbody>
    </table></div>`;
}

// ── Fallback local — usado quando o servidor está indisponível ─────────────
function generateCalendarEvents(){
  const now = new Date();
  const y   = now.getFullYear();
  const events = [];
  function firstFriday(year, month){
    const d = new Date(year, month, 1);
    while(d.getDay() !== 5) d.setDate(d.getDate()+1);
    return new Date(d);
  }
  const bcDefs = [
    {key:'fed',cur:'USD',name:'FOMC — Decisão de Taxa',impact:'High'},
    {key:'copom',cur:'BRL',name:'Copom — Decisão da Selic',impact:'High'},
    {key:'ecb',cur:'EUR',name:'ECB — Decisão de Taxa',impact:'High'},
    {key:'boe',cur:'GBP',name:'BoE — Bank Rate Decision',impact:'High'},
    {key:'boj',cur:'JPY',name:'BoJ — Policy Rate Decision',impact:'High'},
    {key:'boc',cur:'CAD',name:'BoC — Overnight Rate',impact:'High'},
    {key:'rba',cur:'AUD',name:'RBA — Cash Rate Decision',impact:'High'},
    {key:'snb',cur:'CHF',name:'SNB — Policy Rate Decision',impact:'High'},

  const bcMeetings = {
    fed:   ['2026-03-18','2026-04-29','2026-06-17','2026-07-29','2026-09-16','2026-10-28','2026-12-09'],

    ecb:   ['2026-03-19','2026-04-17','2026-06-05','2026-07-24','2026-09-11','2026-10-23','2026-12-04'],
    boe:   ['2026-03-19','2026-04-30','2026-06-18','2026-07-30','2026-09-17','2026-10-29','2026-12-10'],
    boj:   ['2026-03-19','2026-04-30','2026-06-16','2026-07-29','2026-09-18','2026-10-28','2026-12-18'],
    boc:   ['2026-03-18','2026-04-16','2026-06-04','2026-07-16','2026-09-10','2026-10-22','2026-12-10'],
    rba:   ['2026-03-17','2026-05-05','2026-06-16','2026-07-07','2026-08-04','2026-09-01','2026-10-06','2026-11-03','2026-12-01'],
    snb:   ['2026-03-19','2026-06-18','2026-09-24','2026-12-10'],
  };
  bcDefs.forEach(bc => {
    (bcMeetings[bc.key]||[]).forEach(dateStr => {
      const cfg = BC_RATES[bc.key];
      const d   = new Date(dateStr+'T14:00:00');
      const isLast = dateStr === cfg.lastDecision;
      events.push({
        date: d, currency: bc.cur, event: bc.name, impact: bc.impact,
        source: bc.key.toUpperCase(), forecast: cfg.display, previous: cfg.display,
        actual: isLast && cfg.lastResult !== '—' ? cfg.lastResult : '',
      });
    });
  });
  const cpiDates = ['2026-01-15','2026-02-12','2026-03-11','2026-04-10','2026-05-13',
                    '2026-06-11','2026-07-15','2026-08-12','2026-09-11','2026-10-14','2026-11-12','2026-12-11'];
  const cpiResults = {'2026-03-11':'+2,4%','2026-02-12':'+2,7%','2026-01-15':'+2,9%'};
  cpiDates.forEach(ds => {
    const d = new Date(ds+'T09:30:00');
    events.push({date:d,currency:'USD',event:'CPI EUA — Inflação ao Consumidor',
      impact:'High',source:'BLS',forecast:'—',previous:'—',actual:cpiResults[ds]||''});

  for(let m=0;m<12;m++){

    const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    events.push({date:d,currency:'USD',event:`NFP — Non-Farm Payrolls ${months[m]}`,
      impact:'High',source:'BLS',forecast:'—',previous:'—',actual:nfpResults[ds]||''});
  }
  return events;
}

// ── TIMELINE ────────────────────────────────────────────────────────────
function buildTimeline(){
  const by={};
  BANKS.forEach(b=>b.sess.forEach(s=>{if(!by[s])by[s]=[];by[s].push(b);}));
  const expPillMap={hold:'p-hold',hike:'p-hike',cut:'p-cut',watch:'p-watch'};

  let html=`<div class="stitle">TIMELINE DAS REUNIÕES</div><div class="tline">`;
  Object.keys(by).sort().forEach(date=>{
    const banks=by[date], d=days(date);
    const hasDecided=banks.some(b=>b.status==='decided');
    const hasRecent=banks.some(b=>b.status==='recent');
    const isAmanhã=d===1;
    const dotCls=hasDecided?'td-done':hasRecent?'td-hike':d===0?'td-today':isAmanhã?'td-soon':'td-far';
    const lbl=hasDecided?'<span class="tmark-done">✓ CONCLUÍDO</span>':hasRecent?'<span class="tmark-hike">⬆ ALTA — 17/03</span>':d===0?'<span class="tmark">HOJE</span>':d===1?'AMANHÃ':`em ${d} dias`;

    html+=`<div class="titem">
      <div class="tdot ${dotCls}"></div>
      <div class="tcard">
        <div class="tdlbl">${dfmt(date)} · ${lbl}</div>
        <div class="tbanks">
          ${banks.map(b=>`
            <div class="tbank" onclick="selectBank('${b.id}');showTab('detail')">
              <div class="tbl">
                <span class="tflg">${b.flag}</span>
                <div><div class="tabb">${b.abbr}</div><div class="tful">${b.full}</div></div>
              </div>
              <span class="pill ${b.resultPill}" style="font-size:11px">${b.result.substring(0,30)}${b.result.length>30?'…':''}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  });
  document.getElementById('tc').innerHTML=html+`</div><div class="disclaimer" style="margin-top:16px">✓ Verde = decisão real confirmada · Vermelho = alta real (RBA) · Azul = próximas reuniões (previsão) · Cinza = futuras</div>`;
}

const ALL_TABS = ['detail','schedule','flow','timeline','carry','ecocal','correl'];
function showTab(id){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  ALL_TABS.forEach((t,i)=>{
    if(t===id) document.querySelectorAll('.tab')[i].classList.add('active');
  });
}
